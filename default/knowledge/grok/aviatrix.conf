# Aviatrix Custom Grok Patterns for Cribl Stream
# Ported from aviatrix-siem-connector logstash-configs/patterns/avx.conf

# Basic patterns
NUMSTAT (?:%{BASE10NUM}\w.)
AVXDATE %{YEAR}-%{MONTHNUM}-%{MONTHDAY}.*%{TIME}
RULE .*\w
SYSLOG_TIMESTAMP (%{TIMESTAMP_ISO8601}|(%{MONTH} +%{MONTHDAY} +%{TIME}))
CONTROLLER_NAME Controller-
TUNNEL_GW %{NOTSPACE}(%{NOTSPACE} %{NOTSPACE})

# Enhanced patterns for 8.2+ support
AVX_GATEWAY_HOST GW-%{HOSTNAME:gw_hostname}-%{IP:gw_ip}
AVX_MICROSEG_HEADER microseg:|AviatrixGwMicrosegPacket:
AVX_L7_HEADER ats_dcf:|traffic_server(\[%{NUMBER}\]:)?

# 8.2 Session fields pattern (for L4 microseg end-of-session logs)
AVX_SESSION_FIELDS (SESSION_EVENT=%{NUMBER:session_event} SESSION_END_REASON=%{NUMBER:session_end_reason} SESSION_PACKET_COUNT=%{NUMBER:session_packet_count} SESSION_BYTE_COUNT=%{NUMBER:session_byte_count} SESSION_DURATION=%{NUMBER:session_duration_ns})?

# Syslog priority pattern
SYSLOG_PRI <%{NUMBER:syslog_pri}>

# Gateway identifier with optional IP suffix
GW_IDENTIFIER GW-%{HOSTNAME}-%{IP}

# Aviatrix-specific compound patterns for Cribl pipeline use
AVX_MICROSEG_82_SESSION POLICY=%{UUID:uuid} SRC_MAC=%{MAC:src_mac} DST_MAC=%{MAC:dst_mac} IP_SZ=%{NUMBER:ip_size} SRC_IP=%{IP:src_ip} DST_IP=%{IP:dst_ip} PROTO=%{WORD:proto} SRC_PORT=%{NUMBER:src_port} DST_PORT=%{NUMBER:dst_port} DATA=%{NOTSPACE:data_hex} ACT=%{WORD:action} ENFORCED=%{WORD:enforced} SESSION_ID=%{NUMBER:session_id} SESSION_EVENT=%{NUMBER:session_event} SESSION_END_REASON=%{NUMBER:session_end_reason} SESSION_PKT_CNT=%{NUMBER:session_pkt_cnt} SESSION_BYTE_CNT=%{NUMBER:session_byte_cnt} SESSION_DUR=%{NUMBER:session_dur}

AVX_MICROSEG_82_NOSESSION POLICY=%{UUID:uuid} SRC_MAC=%{MAC:src_mac} DST_MAC=%{MAC:dst_mac} IP_SZ=%{NUMBER:ip_size} SRC_IP=%{IP:src_ip} DST_IP=%{IP:dst_ip} PROTO=%{WORD:proto} SRC_PORT=%{NUMBER:src_port} DST_PORT=%{NUMBER:dst_port} DATA=%{NOTSPACE:data_hex} ACT=%{WORD:action} ENFORCED=%{WORD:enforced}

AVX_MICROSEG_LEGACY SRC_MAC=%{MAC:src_mac} DST_MAC=%{MAC:dst_mac} PROTO=%{WORD:proto} SPT=%{NUMBER:src_port} DPT=%{NUMBER:dst_port} ACTION=%{WORD:action}
