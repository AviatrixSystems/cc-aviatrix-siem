id: cc-aviatrix-siem
version: 0.2.0
displayName: Aviatrix Cloud Network Security
description: >
  Parse, normalize, and route Aviatrix Cloud Firewall syslog data for any SIEM destination.
  Supports 9 log types: L4 Microsegmentation, L7/TLS Inspection, Suricata IDS, FQDN Firewall,
  Controller API Audit, VPN Session, Gateway Network Stats, Gateway System Stats, and Tunnel Status.
author: Aviatrix
tags:
  - syslog
  - firewall
  - network
  - security
  - cloud
  - aviatrix
  - microsegmentation
  - ids
  - ips
  - vpn
minCriblVersion: "4.0"
