id: aviatrix-siem
version: 0.1.0
displayName: Aviatrix Cloud Network Security
description: >
  Parse, normalize, and route Aviatrix Cloud Network syslog data for any SIEM destination.
  Supports 8 log types: L4 Microsegmentation, L7/TLS Inspection, Suricata IDS, FQDN Firewall,
  Controller API Audit, Gateway Network Stats, Gateway System Stats, and Tunnel Status.
author: Aviatrix
tags:
  - syslog
  - firewall
  - network
  - security
  - cloud
  - aviatrix
  - microsegmentation
  - ids
  - ips
minCriblVersion: "4.0"
