name: Validate Pack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files exist
        run: |
          ERRORS=0
          for f in package.json pack.yml LICENSE README.md \
                   default/pack.yml default/samples.yml \
                   default/pipelines/route.yml \
                   default/pipelines/avx-parse/conf.yml \
                   default/pipelines/devnull/conf.yml \
                   default/knowledge/grok/aviatrix.conf \
                   default/samples/aviatrix-syslog.log \
                   samples/aviatrix-syslog.log; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ $f"
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS required file(s) missing"
            exit 1
          fi

      - name: Validate pack.yml
        run: |
          for field in id version displayName description author tags minCriblVersion; do
            if ! grep -q "^${field}:" pack.yml; then
              echo "::error::pack.yml missing required field: $field"
              exit 1
            fi
          done
          echo "✓ pack.yml has all required fields"

      - name: Validate package.json
        run: |
          for field in name version author license description displayName minLogStreamVersion tags; do
            if ! python3 -c "import json,sys; d=json.load(open('package.json')); assert '$field' in d, f'missing {field}'" 2>&1; then
              echo "::error::package.json missing required field: $field"
              exit 1
            fi
          done
          echo "✓ package.json has all required fields"

      - name: Validate version consistency
        run: |
          PACK_VER=$(grep '^version:' pack.yml | awk '{print $2}')
          PKG_VER=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          if [ "$PACK_VER" != "$PKG_VER" ]; then
            echo "::error::Version mismatch: pack.yml=$PACK_VER, package.json=$PKG_VER"
            exit 1
          fi
          echo "✓ Versions match: $PACK_VER"

      - name: Validate pipeline conf.yml is valid YAML
        run: |
          python3 -c "
          import yaml, sys
          try:
              with open('default/pipelines/avx-parse/conf.yml') as f:
                  data = yaml.safe_load(f)
              funcs = data.get('functions', [])
              print(f'✓ Pipeline has {len(funcs)} functions')
              groups = set()
              errors = 0
              for fn in funcs:
                  gid = fn.get('groupId', 'ungrouped')
                  groups.add(gid)
                  # Comment functions don't need descriptions
                  if fn.get('id') == 'comment':
                      continue
                  desc = fn.get('description', '')
                  if not desc:
                      print(f\"::error::Function '{fn.get('id')}' in group '{gid}' has no description (Dispensary requirement)\")
                      errors += 1
              print(f'✓ Pipeline groups: {sorted(groups)}')
              if errors:
                  print(f'::error::{errors} function(s) missing descriptions')
                  sys.exit(1)
          except Exception as e:
              print(f'::error::Pipeline YAML invalid: {e}')
              sys.exit(1)
          "

      - name: Validate Grok patterns syntax
        run: |
          python3 -c "
          import re, sys
          errors = 0
          with open('default/knowledge/grok/aviatrix.conf') as f:
              for i, line in enumerate(f, 1):
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if ' ' not in line:
                      print(f'::error::aviatrix.conf line {i}: no space separator')
                      errors += 1
                      continue
                  name = line.split()[0]
                  if not re.match(r'^[A-Z0-9_]+$', name):
                      print(f'::warning::aviatrix.conf line {i}: pattern name \"{name}\" is not UPPER_SNAKE_CASE')
          if errors:
              sys.exit(1)
          print('✓ Grok patterns syntax OK')
          "

      - name: Validate Grok pattern references
        run: |
          python3 << 'PYEOF'
          import re, sys

          # Cribl built-in Grok patterns (standard set shipped with Cribl Stream)
          BUILTINS = {
              'NOTSPACE', 'DATA', 'GREEDYDATA', 'INT', 'NUMBER', 'WORD',
              'IP', 'IPV4', 'IPV6', 'HOSTNAME', 'IPORHOST',
              'BASE10NUM', 'POSINT', 'NONNEGINT',
              'SYSLOGTIMESTAMP', 'TIMESTAMP_ISO8601',
              'MAC', 'UUID',
              'MONTH', 'MONTHNUM', 'MONTHDAY', 'YEAR', 'TIME',
              'SYSLOGHOST', 'SYSLOGPROG', 'SYSLOGFACILITY',
              'QUOTEDSTRING', 'USERNAME', 'SPACE', 'PROG',
          }

          # Parse custom patterns from aviatrix.conf
          custom = set()
          with open('default/knowledge/grok/aviatrix.conf') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      custom.add(line.split()[0])

          known = BUILTINS | custom

          # Find all %{PATTERN} references in pipeline
          with open('default/pipelines/avx-parse/conf.yml') as f:
              content = f.read()
          refs = set(re.findall(r'%\{(\w+)[:\}]', content))

          # Also check patterns referencing other patterns in aviatrix.conf
          with open('default/knowledge/grok/aviatrix.conf') as f:
              grok_content = f.read()
          refs |= set(re.findall(r'%\{(\w+)[:\}]', grok_content))

          missing = refs - known
          if missing:
              for p in sorted(missing):
                  print(f'::error::Undefined Grok pattern referenced: {p}')
              sys.exit(1)
          print(f'✓ All {len(refs)} Grok pattern references resolved ({len(custom)} custom, {len(refs - custom)} built-in)')
          PYEOF

      - name: Validate sample data
        run: |
          SAMPLE="samples/aviatrix-syslog.log"
          LINES=$(wc -l < "$SAMPLE" | tr -d ' ')
          echo "✓ Sample file has $LINES events"
          if [ "$LINES" -lt 10 ]; then
            echo "::error::Sample file has fewer than 10 events"
            exit 1
          fi

      - name: Validate all log types present in samples
        run: |
          # Markers match the classification regexes in the pipeline conf.yml
          # Using grep -F for fixed-string matching (portable, no regex escaping needed)
          MISSING=0
          check_marker() {
            local type="$1" marker="$2"
            if ! grep -qF "$marker" samples/aviatrix-syslog.log; then
              echo "::error::Sample data missing log type '$type' (marker: $marker)"
              MISSING=$((MISSING + 1))
            else
              echo "✓ $type"
            fi
          }
          # Required: all 9 primary log types must have sample data
          check_marker microseg      "AviatrixGwMicrosegPacket"
          check_marker mitm          "traffic_server["
          check_marker suricata      "suricata["
          check_marker fqdn          "AviatrixFQDNRule"
          check_marker cmd           "AviatrixCMD:"
          check_marker vpn_session   "AviatrixVPNSession:"
          check_marker gw_net_stats  "AviatrixGwNetStats:"
          check_marker gw_sys_stats  "AviatrixGwSysStats:"
          check_marker tunnel_status "AviatrixTunnelStatusChange"
          # Optional: cmd_v2 is a newer API audit format, warn if missing
          if ! grep -qF "AviatrixAPI" samples/aviatrix-syslog.log; then
            echo "::warning::Sample data missing cmd_v2 log type (AviatrixAPI)"
          else
            echo "✓ cmd_v2"
          fi
          if [ $MISSING -gt 0 ]; then
            echo "::error::$MISSING log type(s) missing from sample data"
            exit 1
          fi

      - name: Validate sample files are in sync
        run: |
          if ! diff -q default/samples/aviatrix-syslog.log samples/aviatrix-syslog.log > /dev/null 2>&1; then
            echo "::error::default/samples/aviatrix-syslog.log and samples/aviatrix-syslog.log are out of sync"
            diff default/samples/aviatrix-syslog.log samples/aviatrix-syslog.log || true
            exit 1
          fi
          echo "✓ Sample files are in sync"

      - name: Validate routes
        run: |
          python3 -c "
          import yaml
          with open('default/pipelines/route.yml') as f:
              data = yaml.safe_load(f)
          routes = data.get('routes', [])
          has_catchall = any(r.get('filter') == 'true' and r.get('pipeline') == 'devnull' for r in routes)
          if not has_catchall:
              print('::error::Missing catch-all devnull route (Dispensary requirement)')
              exit(1)
          print(f'✓ Routes: {len(routes)} defined, catch-all present')
          "

      - name: Validate no sensitive data in samples
        run: |
          python3 << 'PYEOF'
          import re, sys
          # Look for actual leaked secrets, not field names in audit logs.
          # CMD audit logs legitimately contain 'password', 'api_token' as
          # parameter names with sanitized values (********, '', empty).
          patterns = [
              r'(?i)aws_access_key_id\s*[=:]\s*AK',
              r'(?i)aws_secret_access_key\s*[=:]\s*\S{10,}',
              r'BEGIN (RSA )?PRIVATE KEY',
              r'(?i)(ghp_|gho_|github_pat_)\w{10,}',
          ]
          issues = []
          with open('samples/aviatrix-syslog.log') as f:
              for i, line in enumerate(f, 1):
                  for pat in patterns:
                      m = re.search(pat, line)
                      if m:
                          issues.append(f'Line {i}: {m.group()[:60]}')
          if issues:
              for issue in issues:
                  print(f'::error::{issue}')
              sys.exit(1)
          print('✓ No sensitive data found in sample data')
          PYEOF

      - name: Test .crbl build
        run: |
          PACK_ID=$(grep '^id:' pack.yml | awk '{print $2}')
          VERSION=$(grep '^version:' pack.yml | awk '{print $2}')
          FILENAME="${PACK_ID}-${VERSION}.crbl"
          tar -czf "$FILENAME" \
            package.json README.md LICENSE \
            default/ data/ samples/
          echo "✓ Built $FILENAME ($(du -h "$FILENAME" | cut -f1))"
          # Verify it extracts cleanly
          mkdir -p /tmp/crbl-test
          tar -xzf "$FILENAME" -C /tmp/crbl-test
          for f in package.json README.md LICENSE default/pipelines/avx-parse/conf.yml; do
            if [ ! -f "/tmp/crbl-test/$f" ]; then
              echo "::error::.crbl missing $f after extraction"
              exit 1
            fi
          done
          echo "✓ .crbl extracts cleanly with all required files"
