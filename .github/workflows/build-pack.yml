name: Release Pack

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches pack.yml version
        run: |
          PACK_VERSION=$(grep '^version:' pack.yml | awk '{print $2}')
          if [ "$PACK_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.VERSION }}) does not match pack.yml version ($PACK_VERSION)"
            exit 1
          fi

      - name: Build .crbl
        id: build
        run: |
          PACK_ID=$(grep '^id:' pack.yml | awk '{print $2}')
          VERSION="${{ steps.version.outputs.VERSION }}"
          FILENAME="${PACK_ID}-${VERSION}.crbl"
          tar -czf "$FILENAME" \
            package.json README.md LICENSE logo.png logo.svg \
            default/ data/ samples/ knowledge/
          echo "FILENAME=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "Built $FILENAME ($(du -h "$FILENAME" | cut -f1))"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.FILENAME }}
          generate_release_notes: true
